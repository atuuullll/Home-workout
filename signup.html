<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Homeworkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center">
    <div class="bg-[#06402B] p-8 rounded-lg shadow-lg w-full max-w-md">
        <div class="text-center mb-6">
            <i class="fas fa-dumbbell text-4xl text-white mb-4"></i>
            <h1 class="text-2xl font-bold">Sign Up for Homeworkout</h1>
        </div>
        <form id="signup-form">
            <div class="mb-4">
                <label for="email" class="block text-sm font-medium mb-2">Email</label>
                <input type="email" id="email" class="w-full px-4 py-2 rounded-lg border border-gray-700 bg-black text-white focus:ring-2 focus:ring-white focus:border-white" required>
            </div>
            <div class="mb-4">
                <label for="password" class="block text-sm font-medium mb-2">Password</label>
                <input type="password" id="password" class="w-full px-4 py-2 rounded-lg border border-gray-700 bg-black text-white focus:ring-2 focus:ring-white focus:border-white" required>
            </div>
            <div class="mb-6">
                <label for="confirm-password" class="block text-sm font-medium mb-2">Confirm Password</label>
                <input type="password" id="confirm-password" class="w-full px-4 py-2 rounded-lg border border-gray-700 bg-black text-white focus:ring-2 focus:ring-white focus:border-white" required>
            </div>
            <button type="submit" class="w-full bg-white text-[#06402B] py-2 rounded-lg font-bold hover:bg-gray-200 transition">
                Sign Up
            </button>
        </form>
        <div class="text-center mt-4">
            <p>Already have an account? <a href="login.html" class="text-white underline">Login</a></p>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
    <script src="js/firebase-config.js" type="module"></script>

    <script>
        // Simple signup logic (replace with actual Firebase auth)
        document.getElementById('signup-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            if (password !== confirmPassword) {
                alert('Passwords do not match');
                return;
            }
            // For demo, just redirect to index.html
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
